<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
  <script>
    const API_URL = 'http://localhost:8000/api'
    
    async function testAPI() {
      const results = []
      
      // Test 1: Login
      try {
        const login = await fetch(`${API_URL}/auth/login/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: 'admin@esi-sba.dz',
            password: 'Admin123!'
          })
        })
        const data = await login.json()
        results.push({
          test: 'Login',
          status: login.ok ? '✅' : '❌',
          data
        })
        
        if (data.access) {
          localStorage.setItem('test_token', data.access)
        }
      } catch (e) {
        results.push({ test: 'Login', status: '❌', error: e.message })
      }
      
      // Test 2: Get candidates (authenticated)
      const token = localStorage.getItem('test_token')
      if (token) {
        try {
          const candidates = await fetch(`${API_URL}/candidates/`, {
            headers: { 'Authorization': `Bearer ${token}` }
          })
          const data = await candidates.json()
          results.push({
            test: 'Get Candidates',
            status: candidates.ok ? '✅' : '❌',
            count: data.results?.length || 0
          })
        } catch (e) {
          results.push({ test: 'Get Candidates', status: '❌', error: e.message })
        }
      }
      
      // Display results
      const pre = document.createElement('pre')
      pre.textContent = JSON.stringify(results, null, 2)
      document.body.appendChild(pre)
    }
  </script>
</head>
<body>
  <button onclick="testAPI()">Test API Connection</button>
</body>
</html>
